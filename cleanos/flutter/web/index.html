<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <!-- Obrigatório no mobile: sem isto o browser reporta ~980px de largura e o
       Flutter cai no layout desktop (rail/sidebar) em vez do fintech do APK. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0F4C5C">
  <meta name="description" content="OS Fácil — Painel Web + App Profissional">

  <!-- OpenGraph: card de preview do link "Nova OS" no WhatsApp do profissional.
       GENÉRICO/de marca de PROPÓSITO — o crawler do WhatsApp lê só o HTML estático
       (não roda o SPA) e o card pode ser cacheado/encaminhado pela Meta, então
       NUNCA colocar dado de OS/cliente aqui (anti-desvio). O app abre a OS certa
       depois, pelo path do App Link. -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="OS Fácil">
  <meta property="og:title" content="OS Fácil — Ordem de Serviço">
  <meta property="og:description" content="Toque para abrir a OS no aplicativo OS Fácil.">
  <meta property="og:image" content="https://app.cleanox.com.br/icons/Icon-512.png">
  <meta property="og:url" content="https://app.cleanox.com.br/app">
  <meta name="twitter:card" content="summary">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="OS Fácil">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>OS Fácil</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: #0F4C5C;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }
    #boot-splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #e8f4f6;
      gap: 16px;
      z-index: 9999;
      text-align: center;
      padding: 24px;
      background: #0F4C5C;
      transition: opacity 0.25s ease;
    }
    #boot-splash.boot-hide {
      opacity: 0;
      pointer-events: none;
    }
    #boot-splash .spin {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255,255,255,0.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #boot-splash .msg { font-size: 14px; opacity: 0.9; max-width: 320px; line-height: 1.45; }
    #boot-splash .err { color: #ffd0d0; display: none; }
    #boot-splash button {
      display: none;
      margin-top: 8px;
      background: #fff;
      color: #0F4C5C;
      border: 0;
      border-radius: 10px;
      padding: 12px 18px;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="boot-splash">
    <div class="spin" id="boot-spin"></div>
    <div class="msg" id="boot-msg">Carregando OS Fácil…</div>
    <div class="msg err" id="boot-err"></div>
    <button type="button" id="boot-reload" onclick="location.reload()">Tentar de novo</button>
  </div>

  <script>
    (function () {
      var removed = false;
      function removeSplash() {
        if (removed) return;
        removed = true;
        var el = document.getElementById('boot-splash');
        if (!el) return;
        el.classList.add('boot-hide');
        setTimeout(function () {
          try { el.remove(); } catch (_) {}
        }, 300);
      }

      // Flutter web dispara este evento no primeiro frame.
      window.addEventListener('flutter-first-frame', removeSplash);

      // Fallback: se o canvas/engine do Flutter já estiver no DOM.
      var obs = new MutationObserver(function () {
        if (
          document.querySelector('flt-glass-pane') ||
          document.querySelector('flt-scene-host') ||
          document.querySelector('flutter-view') ||
          document.querySelector('canvas[flt-renderer]')
        ) {
          removeSplash();
          try { obs.disconnect(); } catch (_) {}
        }
      });
      try {
        obs.observe(document.documentElement, { childList: true, subtree: true });
      } catch (_) {}

      // Só avisa de travamento se o app AINDA não montou após 20s.
      setTimeout(function () {
        if (removed) return;
        var msg = document.getElementById('boot-msg');
        var err = document.getElementById('boot-err');
        var btn = document.getElementById('boot-reload');
        var spin = document.getElementById('boot-spin');
        if (msg) msg.textContent = 'Demorando mais que o normal…';
        if (err) {
          err.style.display = 'block';
          err.textContent = 'Se continuar assim: Ctrl+Shift+R ou limpe os dados do site.';
        }
        if (btn) btn.style.display = 'inline-block';
        if (spin) spin.style.display = 'none';
      }, 20000);

      // Limpa Service Workers/caches legados (uma vez por versão).
      var KEY = 'cleanos_sw_purge_v4';
      if (!('serviceWorker' in navigator)) return;
      if (localStorage.getItem(KEY) === '1') return;
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        return Promise.all(regs.map(function (r) { return r.unregister(); }));
      }).then(function () {
        if (!window.caches) return;
        return caches.keys().then(function (keys) {
          return Promise.all(keys.map(function (k) { return caches.delete(k); }));
        });
      }).then(function () {
        localStorage.setItem(KEY, '1');
        if (navigator.serviceWorker.controller) {
          location.reload();
        }
      }).catch(function () { /* best-effort */ });
    })();
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
