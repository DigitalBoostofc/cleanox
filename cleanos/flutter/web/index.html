<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <!-- Obrigatório no mobile: sem isto o browser reporta ~980px de largura e o
       Flutter cai no layout desktop (rail/sidebar) em vez do fintech do APK. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0F4C5C">
  <meta name="description" content="OS Fácil — Painel Web + App Profissional">

  <!-- OpenGraph: card de preview do link "Nova OS" no WhatsApp do profissional.
       GENÉRICO/de marca de PROPÓSITO — o crawler do WhatsApp lê só o HTML estático
       (não roda o SPA) e o card pode ser cacheado/encaminhado pela Meta, então
       NUNCA colocar dado de OS/cliente aqui (anti-desvio). O app abre a OS certa
       depois, pelo path do App Link. -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="OS Fácil">
  <meta property="og:title" content="OS Fácil — Ordem de Serviço">
  <meta property="og:description" content="Toque para abrir a OS no aplicativo OS Fácil.">
  <meta property="og:image" content="https://app.cleanox.com.br/icons/Icon-512.png">
  <meta property="og:url" content="https://app.cleanox.com.br/app">
  <meta name="twitter:card" content="summary">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="OS Fácil">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>OS Fácil</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
